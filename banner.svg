<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="960" height="280" viewBox="0 0 960 280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="960" height="280" rx="16" fill="url(#bg)"/>
  <!-- Cyan border -->
  <rect x="2" y="2" width="956" height="276" rx="15" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.8"/>
  <!-- Subtle inner accent line top -->
  <line x1="40" y1="14" x2="920" y2="14" stroke="#00d4ff" stroke-width="0.5" opacity="0.3"/>
  <!-- Subtle inner accent line bottom -->
  <line x1="40" y1="266" x2="920" y2="266" stroke="#00d4ff" stroke-width="0.5" opacity="0.3"/>
  <!-- Logo (inverted: white on dark via CSS filter) -->
  <image href="data:image/png;base64," x="192" y="40" width="576" height="200" style="filter:invert(1) brightness(1.1)"/>
  <!-- Tagline -->
  <text x="480" y="252" text-anchor="middle" font-family="monospace" font-size="13" fill="#00d4ff" opacity="0.75" letter-spacing="3">WiFi · BLE · USB  —  ESP32-S3 Pen-Test Toolkit</text>
</svg>
